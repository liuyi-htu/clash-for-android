name: Manual APK Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App version, for example 1.0.0+1"
        required: true
        default: "1.4.0+9"
      build_channel:
        description: "Build channel"
        required: true
        default: "test"
        type: choice
        options:
          - "test"
          - "release"

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    outputs:
      artifact_name: ${{ steps.outputs.outputs.artifact_name }}
      build_channel: ${{ steps.meta.outputs.build_channel }}
      build_time: ${{ steps.meta.outputs.build_time }}
      core_archs: ${{ steps.meta.outputs.core_archs }}
      hev_ref: ${{ steps.meta.outputs.hev_ref }}
      mihomo_version: ${{ steps.mihomo.outputs.mihomo_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_title: ${{ steps.meta.outputs.release_title }}
      signing_mode: ${{ steps.signing.outputs.signing_mode }}

    env:
      FLUTTER_VERSION: "3.32.8"
      JAVA_VERSION: "17.0.12+7"
      ANDROID_NDK_VERSION: "27.2.12479018"
      HEV_REF: "c6e4c72246fb0f20bda299f0efc7814bb3098d57"
      HEV_REPO: "https://github.com/heiher/hev-socks5-tunnel.git"
      CACHE_DIR: /tmp/clash-cache
      PROJECT_DIR: mclash
      HEV_BUILD_ROOT: hev-build
      CORE_ARCHS: "arm64"
      REBUILD_HEV: "auto"
      SPLIT_PER_ABI: "1"
      BUILD_CHANNEL: ${{ inputs.build_channel }}
      APP_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          set -Eeuo pipefail
          case "${BUILD_CHANNEL}" in test|release) ;; *) exit 1 ;; esac
          source_version="$(sed -n -E 's/^version:[[:space:]]*([^[:space:]]+).*/\1/p' mclash/pubspec.yaml)"
          [[ "${source_version}" =~ ^[0-9]+[.][0-9]+[.]0[+][0-9]+$ ]] || {
            echo "mclash/pubspec.yaml contains an invalid version: ${source_version}" >&2
            exit 1
          }
          if [[ "${APP_VERSION}" == "source" ]]; then
            APP_VERSION="${source_version}"
          fi
          [[ "${APP_VERSION}" =~ ^[0-9]+[.][0-9]+[.]0[+][0-9]+$ ]] || {
            echo "version must be source or look like 1.0.0+1 or 1.1.0+3" >&2
            exit 1
          }
          sed -i -E "s/^version: .*/version: ${APP_VERSION}/" mclash/pubspec.yaml
          pubspec_version="${APP_VERSION}"
          app_version_full="${pubspec_version%%+*}"
          [[ "${app_version_full}" =~ ^([0-9]+)[.]([0-9]+)[.]0([.-][A-Za-z0-9._-]+)?$ ]] || {
            echo "pubspec.yaml version must use patch 0 for two-part release tags: ${pubspec_version}" >&2
            exit 1
          }
          app_version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}${BASH_REMATCH[3]:-}"

          if [[ "${BUILD_CHANNEL}" == "test" ]]; then
            tag="mclash-test"
            version_label="test"
            title="Mclash for Android Test Build"
          else
            version_label="v${app_version}"
            tag="mclash-${version_label}"
            title="Mclash for Android ${version_label}"
          fi

          build_time="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          core_archs_key="${CORE_ARCHS//,/-}"
          {
            echo "build_channel=${BUILD_CHANNEL}"
            echo "build_time=${build_time}"
            echo "core_archs=${CORE_ARCHS}"
            echo "core_archs_key=${core_archs_key}"
            echo "hev_ref=${HEV_REF}"
            echo "release_tag=${tag}"
            echo "release_title=${title}"
            echo "version_label=${version_label}"
          } >> "${GITHUB_OUTPUT}"
          {
            echo "BUILD_TIME=${build_time}"
            echo "CORE_ARCHS_KEY=${core_archs_key}"
            echo "RELEASE_TAG_RESOLVED=${tag}"
            echo "RELEASE_TITLE=${title}"
            echo "VERSION_LABEL=${version_label}"
          } >> "${GITHUB_ENV}"

      - name: Resolve latest stable mihomo
        id: mihomo
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          metadata="$(
            python3 - <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.request

          token = os.environ.get("GH_TOKEN", "")
          request = urllib.request.Request(
              "https://api.github.com/repos/MetaCubeX/mihomo/releases?per_page=50",
              headers={
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  **({"Authorization": f"Bearer {token}"} if token else {}),
              },
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  releases = json.load(response)
          except Exception as exc:
              print(f"failed to query mihomo releases: {exc}", file=sys.stderr)
              sys.exit(1)

          blocked = re.compile(r"(alpha|beta|rc|nightly)", re.IGNORECASE)
          stable = re.compile(r"^v[0-9]+\.[0-9]+\.[0-9]+$")
          selected = None
          for release in releases:
              tag = release.get("tag_name", "")
              if release.get("draft") or release.get("prerelease"):
                  continue
              if blocked.search(tag) or not stable.match(tag):
                  continue
              selected = release
              break
          if selected is None:
              print("no stable mihomo release found", file=sys.stderr)
              sys.exit(1)

          def select_arm64_asset():
              assets = selected.get("assets", [])
              keys = ("android-arm64-v8", "android-arm64", "android-aarch64")
              candidates = []
              for asset in assets:
                  name = asset.get("name", "").lower()
                  if not name.endswith((".gz", ".zip")):
                      continue
                  if any(x in name for x in ("sha256", "checksum", "compatible")):
                      continue
                  if any(key in name for key in keys):
                      score = 10 if name.endswith(".gz") else 0
                      if "v8" in name:
                          score += 4
                      candidates.append((score, asset))
              if not candidates:
                  print("no mihomo Android arm64 asset found", file=sys.stderr)
                  sys.exit(1)
              asset = max(candidates, key=lambda item: item[0])[1]
              digest = asset.get("digest") or ""
              if not digest.startswith("sha256:"):
                  print(f"mihomo asset {asset.get('name')} has no sha256 digest", file=sys.stderr)
                  sys.exit(1)
              return {
                  "name": asset["name"],
                  "url": asset["browser_download_url"],
                  "sha256": digest.split(":", 1)[1],
              }

          arm64 = select_arm64_asset()
          print(f"MIHOMO_VERSION={selected['tag_name']}")
          print(f"MIHOMO_ARM64_NAME={arm64['name']}")
          print(f"MIHOMO_ARM64_URL={arm64['url']}")
          print(f"MIHOMO_ARM64_SHA256={arm64['sha256']}")
          PY
          )"
          while IFS='=' read -r name value; do
            [[ -n "${name}" && -n "${value}" ]]
            echo "${name}=${value}" >> "${GITHUB_ENV}"
            case "${name}" in
              MIHOMO_VERSION) echo "mihomo_version=${value}" >> "${GITHUB_OUTPUT}" ;;
              MIHOMO_ARM64_NAME) echo "arm64_name=${value}" >> "${GITHUB_OUTPUT}" ;;
              MIHOMO_ARM64_URL) echo "arm64_url=${value}" >> "${GITHUB_OUTPUT}" ;;
              MIHOMO_ARM64_SHA256) echo "arm64_sha256=${value}" >> "${GITHUB_OUTPUT}" ;;
            esac
          done <<< "${metadata}"
          version="$(printf '%s\n' "${metadata}" | awk -F= '$1 == "MIHOMO_VERSION" { print $2 }')"
          [[ "${version}" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]

      - name: Resolve bundled geodata
        id: geodata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          metadata="$(
            python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          token = os.environ.get("GH_TOKEN", "")
          request = urllib.request.Request(
              "https://api.github.com/repos/MetaCubeX/meta-rules-dat/releases/latest",
              headers={
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  **({"Authorization": f"Bearer {token}"} if token else {}),
              },
          )
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  release = json.load(response)
          except Exception as exc:
              print(f"failed to query geodata release: {exc}", file=sys.stderr)
              sys.exit(1)

          assets = {asset.get("name", "").lower(): asset for asset in release.get("assets", [])}
          selected = []
          for name in ("geosite.dat", "geoip.dat", "country.mmdb"):
              asset = assets.get(name)
              if asset is None:
                  print(f"geodata release is missing {name}", file=sys.stderr)
                  sys.exit(1)
              digest = asset.get("digest") or ""
              if not digest.startswith("sha256:"):
                  print(f"geodata asset {name} has no SHA-256 digest", file=sys.stderr)
                  sys.exit(1)
              selected.append((name, asset, digest.split(":", 1)[1]))

          bundle_id = "-".join(str(asset["id"]) for _, asset, _ in selected)
          print(f"GEODATA_BUNDLE_ID={bundle_id}")
          for name, asset, digest in selected:
              key = name.upper().replace(".", "_")
              print(f"{key}_URL={asset['browser_download_url']}")
              print(f"{key}_SHA256={digest}")
          PY
          )"
          while IFS='=' read -r name value; do
            [[ -n "${name}" && -n "${value}" ]]
            echo "${name}=${value}" >> "${GITHUB_ENV}"
            [[ "${name}" != "GEODATA_BUNDLE_ID" ]] || echo "bundle_id=${value}" >> "${GITHUB_OUTPUT}"
          done <<< "${metadata}"
          bundle_id="$(printf '%s\n' "${metadata}" | awk -F= '$1 == "GEODATA_BUNDLE_ID" { print $2 }')"
          [[ "${bundle_id}" =~ ^[0-9]+-[0-9]+-[0-9]+$ ]]

      - name: Refuse existing official release
        if: inputs.build_channel == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          status="$(
            curl -sS -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${GH_REPO}/releases/tags/${RELEASE_TAG_RESOLVED}"
          )"
          case "${status}" in
            404) ;;
            200) echo "Official release ${RELEASE_TAG_RESOLVED} already exists; refusing to overwrite." >&2; exit 1 ;;
            *) echo "Failed to check release ${RELEASE_TAG_RESOLVED}; GitHub API status ${status}" >&2; exit 1 ;;
          esac

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install fixed Android SDK packages
        shell: bash
        run: |
          set -Eeuo pipefail
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          sdkmanager_bin=""
          if [[ -n "${sdk_root}" && -x "${sdk_root}/cmdline-tools/latest/bin/sdkmanager" ]]; then
            sdkmanager_bin="${sdk_root}/cmdline-tools/latest/bin/sdkmanager"
          elif command -v sdkmanager >/dev/null 2>&1; then
            sdkmanager_bin="$(command -v sdkmanager)"
          else
            echo "sdkmanager not found in PATH or Android SDK cmdline-tools" >&2
            exit 1
          fi
          yes | "${sdkmanager_bin}" --licenses >/dev/null || true
          install_sdk_packages() {
            "${sdkmanager_bin}" \
              "platform-tools" \
              "platforms;android-35" \
              "build-tools;35.0.0" \
              "ndk;${ANDROID_NDK_VERSION}"
          }

          for attempt in 1 2 3; do
            if install_sdk_packages; then
              break
            fi
            if [[ "${attempt}" == "3" ]]; then
              echo "Android SDK package installation failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "Android SDK package installation failed; cleaning partial downloads before retry ${attempt}/3" >&2
            rm -rf \
              "${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" \
              "${ANDROID_HOME}/.temp" \
              "${ANDROID_HOME}/temp"
            sleep $((attempt * 10))
          done
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            /tmp/clash-cache
            hev-build
          key: mclash-build-${{ runner.os }}-workflow-${{ hashFiles('.github/workflows/manual-build.yml') }}-flutter-${{ env.FLUTTER_VERSION }}-ndk-${{ env.ANDROID_NDK_VERSION }}-mihomo-${{ steps.mihomo.outputs.mihomo_version }}-geodata-${{ steps.geodata.outputs.bundle_id }}-hev-${{ env.HEV_REF }}-${{ steps.meta.outputs.core_archs_key }}-${{ hashFiles('mclash/pubspec.lock', 'mclash/android/gradle/wrapper/gradle-wrapper.properties', 'mclash/android/app/build.gradle.kts') }}
          restore-keys: |
            mclash-build-${{ runner.os }}-workflow-${{ hashFiles('.github/workflows/manual-build.yml') }}-flutter-${{ env.FLUTTER_VERSION }}-ndk-${{ env.ANDROID_NDK_VERSION }}-mihomo-${{ steps.mihomo.outputs.mihomo_version }}-hev-${{ env.HEV_REF }}-

      - name: Prepare directories
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "${CACHE_DIR}/mihomo/${MIHOMO_VERSION}" "${PROJECT_DIR}/android/app/src/main/jniLibs"
          rm -rf "${PROJECT_DIR}/android/app/src/main/jniLibs" "${PROJECT_DIR}/android/app/src/main/assets/geodata" dist final-apks
          mkdir -p "${PROJECT_DIR}/android/app/src/main/jniLibs" "${PROJECT_DIR}/android/app/src/main/assets/geodata"
          {
            echo "sdk.dir=${ANDROID_HOME}"
            echo "flutter.sdk=${FLUTTER_ROOT}"
            echo "flutter.buildMode=release"
          } > "${PROJECT_DIR}/android/local.properties"

      - name: Download and verify bundled geodata
        shell: bash
        run: |
          set -Eeuo pipefail
          cache_dir="${CACHE_DIR}/geodata/${GEODATA_BUNDLE_ID}"
          asset_dir="${PROJECT_DIR}/android/app/src/main/assets/geodata"
          mkdir -p "${cache_dir}" "${asset_dir}"
          download_geodata() {
            local name="$1" url="$2" expected="$3"
            local cached="${cache_dir}/${name}"
            if [[ ! -s "${cached}" ]] || [[ "$(sha256sum "${cached}" | awk '{ print $1 }')" != "${expected}" ]]; then
              rm -f "${cached}"
              curl --fail --show-error --location --retry 3 "${url}" -o "${cached}"
            fi
            actual="$(sha256sum "${cached}" | awk '{ print $1 }')"
            [[ "${actual}" == "${expected}" ]] || {
              echo "${name} SHA-256 mismatch: expected=${expected} actual=${actual}" >&2
              exit 1
            }
            install -m 0644 "${cached}" "${asset_dir}/${name}"
          }
          download_geodata geosite.dat "${GEOSITE_DAT_URL}" "${GEOSITE_DAT_SHA256}"
          download_geodata geoip.dat "${GEOIP_DAT_URL}" "${GEOIP_DAT_SHA256}"
          download_geodata country.mmdb "${COUNTRY_MMDB_URL}" "${COUNTRY_MMDB_SHA256}"

      - name: Download and verify mihomo
        shell: bash
        run: |
          set -Eeuo pipefail
          download_mihomo() {
            local arch="$1" abi="$2" name="$3" url="$4" expected="$5"
            local archive="${CACHE_DIR}/mihomo/${MIHOMO_VERSION}/${name}"
            local cache_bin="${CACHE_DIR}/mihomo/${MIHOMO_VERSION}/${abi}/libmihomo.so"
            local temp
            mkdir -p "$(dirname "${cache_bin}")"
            if [[ ! -s "${cache_bin}" ]]; then
              temp="$(mktemp -d)"
              curl --fail --show-error --location --retry 3 "${url}" -o "${archive}"
              actual="$(sha256sum "${archive}" | awk '{ print $1 }')"
              [[ "${actual}" == "${expected}" ]] || {
                echo "mihomo ${arch} SHA-256 mismatch: expected=${expected} actual=${actual}" >&2
                exit 1
              }
              case "${name}" in
                *.gz) gzip -dc "${archive}" > "${temp}/mihomo" ;;
                *.zip)
                  unzip -q "${archive}" -d "${temp}/unzip"
                  found="$(find "${temp}/unzip" -type f -iname 'mihomo*' ! -iname '*.sha*' | head -n1 || true)"
                  [[ -n "${found}" ]] || { echo "${name} does not contain a mihomo executable" >&2; exit 1; }
                  cp "${found}" "${temp}/mihomo"
                  ;;
                *) echo "Unsupported mihomo asset format: ${name}" >&2; exit 1 ;;
              esac
              file "${temp}/mihomo" | grep -q ELF || {
                echo "Downloaded mihomo ${arch} file is not an ELF executable" >&2
                exit 1
              }
              install -m 0755 "${temp}/mihomo" "${cache_bin}"
              rm -rf "${temp}"
            fi
            install -m 0755 "${cache_bin}" "${PROJECT_DIR}/android/app/src/main/jniLibs/${abi}/libmihomo.so"
          }
          [[ "${CORE_ARCHS}" == "arm64" ]]
          mkdir -p "${PROJECT_DIR}/android/app/src/main/jniLibs/arm64-v8a"
          download_mihomo arm64 arm64-v8a "${MIHOMO_ARM64_NAME}" "${MIHOMO_ARM64_URL}" "${MIHOMO_ARM64_SHA256}"

      - name: Checkout HevSocks5Tunnel
        shell: bash
        run: |
          set -Eeuo pipefail
          src="${HEV_BUILD_ROOT}/jni"
          if [[ ! -d "${src}/.git" ]]; then
            rm -rf "${HEV_BUILD_ROOT}"
            mkdir -p "${HEV_BUILD_ROOT}"
            git clone --recursive "${HEV_REPO}" "${src}"
          fi
          if ! git -C "${src}" cat-file -e "${HEV_REF}^{commit}" 2>/dev/null; then
            git -C "${src}" fetch --depth 1 origin "${HEV_REF}"
          fi
          git -C "${src}" checkout --detach "${HEV_REF}"
          git -C "${src}" reset --hard "${HEV_REF}"
          git -C "${src}" submodule update --init --recursive
          actual="$(git -C "${src}" rev-parse HEAD)"
          [[ "${actual}" == "${HEV_REF}" ]] || {
            echo "Hev checkout mismatch: expected=${HEV_REF} actual=${actual}" >&2
            exit 1
          }
          [[ -f "${src}/Android.mk" ]] || { echo "Hev Android.mk is missing" >&2; exit 1; }

      - name: Build HevSocks5Tunnel
        shell: bash
        run: |
          set -Eeuo pipefail
          abi="arm64-v8a"
          rebuild=0
          case "${REBUILD_HEV}" in
            1) rebuild=1 ;;
            0) rebuild=0 ;;
            auto) [[ -d "${HEV_BUILD_ROOT}/libs" ]] || rebuild=1 ;;
          esac
          [[ "${CORE_ARCHS}" == "arm64" ]]
          [[ -s "${HEV_BUILD_ROOT}/libs/${abi}/libhev-socks5-tunnel.so" ]] || rebuild=1
          if [[ "${rebuild}" == 1 ]]; then
            cat > "${HEV_BUILD_ROOT}/jni/Application.mk" <<EOF
          APP_ABI := arm64-v8a
          APP_PLATFORM := android-23
          APP_STL := c++_static
          APP_OPTIM := release
          EOF
            "${ANDROID_NDK_HOME}/ndk-build" -C "${HEV_BUILD_ROOT}" -j"$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 2)"
          fi
          source="${HEV_BUILD_ROOT}/libs/${abi}/libhev-socks5-tunnel.so"
          [[ -s "${source}" ]] || { echo "Missing Hev output: ${source}" >&2; exit 1; }
          install -m 0755 "${source}" "${PROJECT_DIR}/android/app/src/main/jniLibs/${abi}/libhev-socks5-tunnel.so"

      - name: Prepare Android native libraries
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ "${CORE_ARCHS}" == "arm64" ]]
          test -s "${PROJECT_DIR}/android/app/src/main/jniLibs/arm64-v8a/libmihomo.so"
          test -s "${PROJECT_DIR}/android/app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so"

      - name: Collect third-party licenses
        shell: bash
        run: |
          set -Eeuo pipefail
          license_dir="${PROJECT_DIR}/android/app/src/main/assets/licenses"
          mkdir -p "${license_dir}"
          cat > "${license_dir}/mihomo-LICENSE.txt" <<EOF
          mihomo is licensed under GPL-3.0.

          Source: https://github.com/MetaCubeX/mihomo
          Version used by this build: ${MIHOMO_VERSION}

          See the mihomo repository for complete license text and copyright notices.
          EOF
          cp "${HEV_BUILD_ROOT}/jni/LICENSE" "${license_dir}/hev-socks5-tunnel-LICENSE.txt"
          cat > "${license_dir}/meta-rules-dat-LICENSE.txt" <<EOF
          GeoSite.dat, GeoIP.dat, and Country.mmdb are provided by MetaCubeX/meta-rules-dat.
          License: GPL-3.0
          Source: https://github.com/MetaCubeX/meta-rules-dat

          See the upstream repository for complete license text and copyright notices.
          EOF

      - name: Configure release signing from secrets
        id: signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -Eeuo pipefail
          if [[ -n "${ANDROID_KEYSTORE_BASE64}" && -n "${ANDROID_KEYSTORE_PASSWORD}" && -n "${ANDROID_KEY_ALIAS}" && -n "${ANDROID_KEY_PASSWORD}" ]]; then
            keystore_file="${RUNNER_TEMP}/release.jks"
            printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${keystore_file}"
            chmod 600 "${keystore_file}"
            {
              echo "storeFile=${keystore_file}"
              echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
              echo "keyAlias=${ANDROID_KEY_ALIAS}"
              echo "keyPassword=${ANDROID_KEY_PASSWORD}"
            } > "${PROJECT_DIR}/android/key.properties"
            chmod 600 "${PROJECT_DIR}/android/key.properties"
            echo "SIGNING_MODE=signed" >> "${GITHUB_ENV}"
            echo "signing_mode=signed" >> "${GITHUB_OUTPUT}"
          else
            echo "SIGNING_MODE=unsigned" >> "${GITHUB_ENV}"
            echo "signing_mode=unsigned" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install Flutter dependencies
        shell: bash
        working-directory: mclash
        run: |
          set -Eeuo pipefail
          flutter pub get

      - name: Run static checks
        shell: bash
        working-directory: mclash
        run: |
          set -Eeuo pipefail
          flutter analyze --no-fatal-infos

      - name: Build Android APKs
        shell: bash
        working-directory: mclash
        run: |
          set -Eeuo pipefail
          rm -rf build/app/outputs/flutter-apk
          [[ "${CORE_ARCHS}" == "arm64" ]]
          args=(build apk --release --target-platform=android-arm64)
          if [[ "${SPLIT_PER_ABI}" == 1 ]]; then args+=(--split-per-abi); fi
          flutter "${args[@]}"

      - name: Verify APK contents
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf dist
          mkdir -p dist
          find "${PROJECT_DIR}/build/app/outputs/flutter-apk" -maxdepth 1 -type f -name '*.apk' -exec cp -v {} dist/ \;
          count=0
          while IFS= read -r apk; do
            count=$((count + 1))
            base="$(basename "${apk}")"
            entries="$(unzip -Z1 "${apk}")"
            case "${base}" in
              *arm64-v8a*) abis=("arm64-v8a") ;;
              *armeabi-v7a*) echo "Unexpected ARMv7 APK: ${apk}" >&2; exit 1 ;;
              *x86_64*) echo "Unexpected x86_64 APK: ${apk}" >&2; exit 1 ;;
              *) abis=("arm64-v8a") ;;
            esac
            for abi in "${abis[@]}"; do
              [[ "${entries}" == *"lib/${abi}/libmihomo.so"* ]] || { echo "${apk} missing libmihomo.so for ${abi}" >&2; exit 1; }
              [[ "${entries}" == *"lib/${abi}/libhev-socks5-tunnel.so"* ]] || { echo "${apk} missing libhev-socks5-tunnel.so for ${abi}" >&2; exit 1; }
            done
            for asset in geosite.dat geoip.dat country.mmdb; do
              [[ "${entries}" == *"assets/geodata/${asset}"* ]] || { echo "${apk} missing bundled ${asset}" >&2; exit 1; }
            done
          done < <(find dist -maxdepth 1 -type f -name '*.apk' | sort)
          [[ "${count}" -gt 0 ]] || { echo "No APK files were produced" >&2; exit 1; }

      - name: Verify APK signatures
        shell: bash
        run: |
          set -Eeuo pipefail
          apksigner="${ANDROID_HOME}/build-tools/35.0.0/apksigner"
          [[ -x "${apksigner}" ]] || { echo "apksigner not found: ${apksigner}" >&2; exit 1; }
          while IFS= read -r apk; do
            if [[ "${SIGNING_MODE}" == "signed" ]]; then
              "${apksigner}" verify --verbose --print-certs "${apk}"
            else
              if "${apksigner}" verify --verbose --print-certs "${apk}" >/tmp/apksigner.out 2>&1; then
                cat /tmp/apksigner.out
                echo "Unsigned build unexpectedly produced a signed APK: ${apk}" >&2
                exit 1
              fi
            fi
          done < <(find dist -maxdepth 1 -type f -name '*.apk' | sort)

      - name: Normalize APK names and checksums
        id: outputs
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p final-apks
          shopt -s nullglob
          for apk in dist/*.apk; do
            base="$(basename "${apk}")"
            case "${base}" in
              *arm64-v8a*) abi="arm64" ;;
              *) echo "Unexpected non-ARM64 APK: ${apk}" >&2; exit 1 ;;
            esac
            final="Mclash-for-Android-${VERSION_LABEL}-${abi}-${SIGNING_MODE}.apk"
            cp "${apk}" "final-apks/${final}"
          done
          count="$(find final-apks -maxdepth 1 -name '*.apk' | wc -l)"
          [[ "${count}" -gt 0 ]] || {
            echo "No APK files were produced" >&2
            exit 1
          }
          (
            cd final-apks
            sha256sum -- *.apk > SHA256SUMS
          )
          artifact_name="Mclash-for-Android-${VERSION_LABEL}-${SIGNING_MODE}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.outputs.outputs.artifact_name }}
          path: final-apks/*
          if-no-files-found: error

      - name: Clean temporary signing files
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "${RUNNER_TEMP}/release.jks" mclash/android/key.properties

  publish-test:
    name: Publish Test Release
    needs: build
    if: needs.build.outputs.build_channel == 'test' && needs.build.outputs.signing_mode == 'signed'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release-apks

      - name: Publish test release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BUILD_TIME: ${{ needs.build.outputs.build_time }}
          CORE_ARCHS: ${{ needs.build.outputs.core_archs }}
          HEV_REF: ${{ needs.build.outputs.hev_ref }}
          MIHOMO_VERSION: ${{ needs.build.outputs.mihomo_version }}
          SIGNING_MODE: ${{ needs.build.outputs.signing_mode }}
        run: |
          set -Eeuo pipefail
          tag="mclash-test"
          title="Mclash for Android Test Build"
          notes="$(mktemp)"
          {
            echo "Mclash test build. This tag is overwritten by newer signed test builds."
            echo
            echo "- Build time: ${BUILD_TIME}"
            echo "- Git commit: ${GITHUB_SHA}"
            echo "- mihomo: ${MIHOMO_VERSION}"
            echo "- HevSocks5Tunnel: ${HEV_REF}"
            echo "- Target architectures: ${CORE_ARCHS}"
            echo "- Signing status: ${SIGNING_MODE}"
            echo "- GitHub Actions run number: ${GITHUB_RUN_NUMBER}"
            echo
            echo "Verify downloads with:"
            echo
            echo '```bash'
            echo "sha256sum -c SHA256SUMS"
            echo '```'
          } > "${notes}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "${title}" --notes-file "${notes}"
            while IFS= read -r asset; do
              case "${asset}" in
                *.apk|SHA256SUMS) gh release delete-asset "${tag}" "${asset}" --yes ;;
              esac
            done < <(gh release view "${tag}" --json assets --jq '.assets[].name')
            gh release upload "${tag}" release-apks/*.apk release-apks/SHA256SUMS --clobber
          else
            gh release create "${tag}" release-apks/*.apk release-apks/SHA256SUMS \
              --title "${title}" \
              --notes-file "${notes}"
          fi

  persist-version:
    name: Persist App and Build Form Version
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    concurrency:
      group: mclash-version-sync
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Checkout latest main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Update persisted version when higher
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          requested = os.environ["REQUESTED_VERSION"]
          version_pattern = re.compile(r"^([0-9]+)[.]([0-9]+)[.]0[+]([0-9]+)$")

          def version_key(value: str) -> tuple[int, int, int]:
              match = version_pattern.fullmatch(value)
              if match is None:
                  raise SystemExit(f"invalid app version: {value}")
              return tuple(int(part) for part in match.groups())

          pubspec_path = Path("mclash/pubspec.yaml")
          pubspec = pubspec_path.read_text(encoding="utf-8")
          current_match = re.search(r"(?m)^version:[ ]*([^\r\n]+)$", pubspec)
          if current_match is None:
              raise SystemExit("mclash/pubspec.yaml has no version field")
          current = current_match.group(1).strip()

          if requested == "source":
              target = current
          elif version_key(requested) < version_key(current):
              print(f"Keeping persisted version {current}; requested {requested} is not higher.")
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
                  output.write("changed=false\n")
              raise SystemExit(0)
          else:
              target = requested

          changed = False
          if target != current:
              updated_pubspec = re.sub(
                  r"(?m)^version:[ ]*[^\r\n]+$",
                  f"version: {target}",
                  pubspec,
                  count=1,
              )
              pubspec_path.write_text(updated_pubspec, encoding="utf-8")
              changed = True

          workflow_path = Path(".github/workflows/manual-build.yml")
          workflow_lines = workflow_path.read_text(encoding="utf-8").splitlines(keepends=True)
          in_version_input = False
          default_found = False
          for index, line in enumerate(workflow_lines):
              if line.rstrip("\r\n") == "      version:":
                  in_version_input = True
                  continue
              if in_version_input and re.match(r"^      [A-Za-z0-9_-]+:", line):
                  break
              if in_version_input and re.match(r"^        default:", line):
                  default_found = True
                  newline = "\r\n" if line.endswith("\r\n") else "\n"
                  replacement = f'        default: "{target}"{newline}'
                  if line != replacement:
                      workflow_lines[index] = replacement
                      changed = True
                  break
          if not default_found:
              raise SystemExit("workflow version input default was not found")
          workflow_path.write_text("".join(workflow_lines), encoding="utf-8")

          print(f"Persisted app and build form version: {target}; changed={changed}.")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"changed={'true' if changed else 'false'}\n")
          PY

      - name: Commit persisted version
        if: steps.version.outputs.changed == 'true'
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          VERSION_SYNC_DEPLOY_KEY: ${{ secrets.VERSION_SYNC_DEPLOY_KEY }}
        run: |
          set -Eeuo pipefail
          [[ -n "${VERSION_SYNC_DEPLOY_KEY}" ]] || {
            echo "VERSION_SYNC_DEPLOY_KEY is not configured" >&2
            exit 1
          }
          key_file="${RUNNER_TEMP}/mclash-version-sync"
          known_hosts="${RUNNER_TEMP}/mclash-version-sync-known-hosts"
          cleanup() {
            rm -f "${key_file}" "${known_hosts}"
          }
          trap cleanup EXIT
          printf '%s\n' "${VERSION_SYNC_DEPLOY_KEY}" > "${key_file}"
          chmod 600 "${key_file}"
          python3 - <<'PY' > "${known_hosts}"
          import json
          import urllib.request

          request = urllib.request.Request(
              "https://api.github.com/meta",
              headers={"Accept": "application/vnd.github+json"},
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              metadata = json.load(response)
          for key in metadata.get("ssh_keys", []):
              print(f"github.com {key}")
          PY
          [[ -s "${known_hosts}" ]] || {
            echo "Failed to obtain GitHub SSH host keys" >&2
            exit 1
          }
          export GIT_SSH_COMMAND="ssh -i ${key_file} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=${known_hosts}"
          git config user.name "liuyi-htu"
          git config user.email "293212179+liuyi-htu@users.noreply.github.com"
          git remote set-url origin "git@github.com:${GITHUB_REPOSITORY}.git"
          git add mclash/pubspec.yaml .github/workflows/manual-build.yml
          git commit -m "Persist app version ${REQUESTED_VERSION}"
          git push origin HEAD:main

  publish-release:
    name: Publish Official Release
    needs: build
    if: needs.build.outputs.build_channel == 'release' && needs.build.outputs.signing_mode == 'signed'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release-apks

      - name: Publish official release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BUILD_TIME: ${{ needs.build.outputs.build_time }}
          CORE_ARCHS: ${{ needs.build.outputs.core_archs }}
          HEV_REF: ${{ needs.build.outputs.hev_ref }}
          MIHOMO_VERSION: ${{ needs.build.outputs.mihomo_version }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
          RELEASE_TITLE: ${{ needs.build.outputs.release_title }}
          SIGNING_MODE: ${{ needs.build.outputs.signing_mode }}
        run: |
          set -Eeuo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Official release ${RELEASE_TAG} already exists; refusing to overwrite." >&2
            exit 1
          fi
          notes="$(mktemp)"
          {
            echo "Mclash official Android release."
            echo
            echo "- Build time: ${BUILD_TIME}"
            echo "- Git commit: ${GITHUB_SHA}"
            echo "- mihomo: ${MIHOMO_VERSION}"
            echo "- HevSocks5Tunnel: ${HEV_REF}"
            echo "- Target architectures: ${CORE_ARCHS}"
            echo "- Signing status: ${SIGNING_MODE}"
            echo "- GitHub Actions run number: ${GITHUB_RUN_NUMBER}"
            echo
            echo "Verify downloads with:"
            echo
            echo '```bash'
            echo "sha256sum -c SHA256SUMS"
            echo '```'
          } > "${notes}"
          gh release create "${RELEASE_TAG}" release-apks/*.apk release-apks/SHA256SUMS \
            --title "${RELEASE_TITLE}" \
            --notes-file "${notes}"
