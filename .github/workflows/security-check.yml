name: Security Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-checks:
    name: Workflow checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: raven-actions/actionlint@v2.2.0
        with:
          version: "1.7.11"

      - name: Extract and syntax-check bash blocks
        shell: bash
        run: |
          set -Eeuo pipefail
          tmp="$(mktemp -d)"
          python3 -m pip install --user PyYAML
          python3 - <<'PY' "${tmp}"
          import pathlib
          import sys
          import yaml

          out = pathlib.Path(sys.argv[1])
          index = 0

          def visit(node):
              global index
              if isinstance(node, dict):
                  if node.get("shell") == "bash" and isinstance(node.get("run"), str):
                      path = out / f"run-{index:03d}.bash"
                      path.write_text(node["run"], encoding="utf-8")
                      index += 1
                  for value in node.values():
                      visit(value)
              elif isinstance(node, list):
                  for value in node:
                      visit(value)

          for workflow in pathlib.Path(".github/workflows").glob("*.yml"):
              with workflow.open(encoding="utf-8") as handle:
                  visit(yaml.safe_load(handle))
          print(index)
          PY
          find "${tmp}" -type f -name '*.bash' -print0 | xargs -0 -r -n1 bash -n
